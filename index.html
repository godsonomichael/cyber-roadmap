<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Roadmap Pro · Career Paths 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Orbitron:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#080b12;--bg2:#0d1220;--surface:#111827;--surface2:#162035;--card:#0f1a2e;--border:rgba(99,179,255,0.10);--border2:rgba(99,179,255,0.18);--accent:#3b82f6;--accent2:#60a5fa;--accent3:#93c5fd;--cyan:#06b6d4;--green:#10b981;--purple:#8b5cf6;--orange:#f59e0b;--red:#ef4444;--text:#f0f6ff;--text2:#94a3b8;--text3:#4b6080;--glow:rgba(59,130,246,0.15);--pink:#ff0080;--pink-glow:rgba(255,0,128,0.3)}
[data-theme="light"]{--bg:#f0f4fc;--bg2:#e8eef8;--surface:#ffffff;--surface2:#f5f8ff;--card:#eef2fc;--border:rgba(59,130,246,0.12);--border2:rgba(59,130,246,0.22);--text:#0f172a;--text2:#475569;--text3:#94a3b8;--glow:rgba(59,130,246,0.08);--pink-glow:rgba(255,0,128,0.15)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;transition:background 0.3s,color 0.3s}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:50px 50px;opacity:0.4;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(59,130,246,0.12) 0%,transparent 70%);pointer-events:none;z-index:0}

@keyframes glitch1{0%,90%,100%{transform:translate(0);opacity:0}91%,93%,95%,97%{opacity:0.6}91%{transform:translate(-3px,1px)}93%{transform:translate(3px,-1px)}95%{transform:translate(-2px,2px)}97%{transform:translate(2px,-2px)}}
@keyframes glitch2{0%,90%,100%{transform:translate(0);opacity:0}91%,93%,95%,97%{opacity:0.5}91%{transform:translate(3px,-1px)}93%{transform:translate(-3px,1px)}95%{transform:translate(2px,-2px)}97%{transform:translate(-2px,2px)}}
@keyframes logoPulse{0%,100%{box-shadow:0 0 30px var(--pink-glow),0 0 60px rgba(255,0,128,0.1)}50%{box-shadow:0 0 60px var(--pink-glow),0 0 120px rgba(255,0,128,0.2)}}
@keyframes scanMove{0%{transform:translateY(0)}100%{transform:translateY(100px)}}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
@keyframes progressShimmer{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}
@keyframes checkPop{0%{transform:scale(0.5)}55%{transform:scale(1.35)}80%{transform:scale(0.95)}100%{transform:scale(1)}}
@keyframes streakFire{0%{transform:scale(1)}35%{transform:scale(1.28) rotate(-5deg)}65%{transform:scale(0.93) rotate(4deg)}100%{transform:scale(1)}}
@keyframes glowPing{0%{transform:scale(1);opacity:0.7}70%,100%{transform:scale(2.4);opacity:0}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(28px) scale(0.9)}60%{transform:translateX(-50%) translateY(-4px) scale(1.02)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.75)}}
@keyframes countBump{0%{transform:scale(1)}40%{transform:scale(1.22);color:var(--green)}100%{transform:scale(1)}}
@keyframes drawerUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes tileIn{from{opacity:0;transform:translateY(18px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes borderFlow{0%{border-color:rgba(59,130,246,0.2)}50%{border-color:rgba(6,182,212,0.5)}100%{border-color:rgba(59,130,246,0.2)}}
@keyframes slideRight{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── AUTH ── */
#authPage{display:none;position:fixed;inset:0;z-index:100;background:var(--bg);align-items:center;justify-content:center;flex-direction:column;padding:20px}
.auth-glow{position:absolute;top:-150px;left:50%;transform:translateX(-50%);width:700px;height:700px;background:radial-gradient(circle,rgba(255,0,128,0.08) 0%,rgba(59,130,246,0.06) 40%,transparent 70%);pointer-events:none}
.auth-brand{text-align:center;margin-bottom:28px;position:relative;z-index:1;animation:fadeInDown 0.55s cubic-bezier(0.16,1,0.3,1) both}
.auth-brand-logo{width:72px;height:72px;margin:0 auto 16px;border-radius:20px;overflow:hidden;animation:logoPulse 3.5s ease-in-out infinite;position:relative}
.auth-brand-logo img{width:100%;height:100%;object-fit:cover;border-radius:20px;display:block}
.auth-brand-name{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:800;letter-spacing:0.04em;color:var(--text);margin-bottom:5px;position:relative;display:inline-block}
.auth-brand-name::before{content:attr(data-text);position:absolute;left:0;top:0;width:100%;height:100%;color:#ff0080;animation:glitch1 4s infinite;clip-path:polygon(0 15%,100% 15%,100% 35%,0 35%)}
.auth-brand-name::after{content:attr(data-text);position:absolute;left:0;top:0;width:100%;height:100%;color:#00ffff;animation:glitch2 4s infinite;clip-path:polygon(0 65%,100% 65%,100% 85%,0 85%)}
.auth-brand-sub{font-size:0.7rem;color:var(--text3);letter-spacing:0.14em;text-transform:uppercase}
.auth-card{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:28px 26px;width:100%;max-width:380px;position:relative;z-index:1;box-shadow:0 24px 80px rgba(0,0,0,0.5);animation:fadeInScale 0.5s 0.1s cubic-bezier(0.16,1,0.3,1) both;overflow:hidden}
.auth-card::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,255,0.012) 3px,rgba(0,255,255,0.012) 4px);pointer-events:none;border-radius:20px;animation:scanMove 10s linear infinite}
.auth-tabs{display:flex;gap:5px;margin-bottom:22px;background:var(--bg2);border-radius:12px;padding:4px}
.auth-tab{flex:1;padding:9px;background:transparent;border:none;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:0.84rem;font-weight:600;cursor:pointer;border-radius:9px;transition:all 0.22s cubic-bezier(0.16,1,0.3,1)}
.auth-tab.active{background:linear-gradient(135deg,var(--accent),#1d4ed8);color:#fff;box-shadow:0 4px 16px rgba(59,130,246,0.4)}
.field{margin-bottom:14px}
.field label{display:block;font-size:0.67rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.field input{width:100%;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;padding:11px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.18)}
.field input::placeholder{color:var(--text3)}
.pass-wrap{position:relative}
.pass-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;color:var(--text3);padding:2px}
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),#1d4ed8);color:#fff;border:none;border-radius:11px;font-family:'Orbitron',monospace;font-size:0.82rem;font-weight:700;cursor:pointer;margin-top:4px;transition:all 0.22s;box-shadow:0 6px 24px rgba(59,130,246,0.4);letter-spacing:0.04em}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(59,130,246,0.55)}
.auth-err{font-size:0.74rem;color:var(--red);margin-top:10px;min-height:16px;font-weight:500}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:50;background:rgba(8,11,18,0.88);backdrop-filter:blur(22px);border-bottom:1px solid var(--border);height:54px;transition:background 0.3s}
[data-theme="light"] .nav{background:rgba(240,244,252,0.9)}
.nav-inner{max-width:760px;margin:0 auto;padding:0 16px;height:100%;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer}
.nav-logo-img{width:32px;height:32px;border-radius:9px;overflow:hidden;flex-shrink:0;box-shadow:0 0 16px var(--pink-glow);animation:logoPulse 3.5s ease-in-out infinite}
.nav-logo-img img{width:100%;height:100%;object-fit:cover;display:block}
.nav-logo-text{font-family:'Orbitron',monospace;font-size:0.78rem;font-weight:700;letter-spacing:0.06em;color:var(--text)}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-back{display:none;align-items:center;gap:6px;padding:6px 12px;background:var(--surface);border:1px solid var(--border2);border-radius:9px;color:var(--text2);font-size:0.78rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.18s}
.nav-back:hover{background:var(--surface2);color:var(--text)}
.nav-back.show{display:flex}
.hamburger{background:none;border:1.5px solid var(--border2);border-radius:9px;padding:7px 9px;cursor:pointer;display:flex;flex-direction:column;gap:4px;transition:all 0.2s}
.hamburger:hover{border-color:var(--accent);background:rgba(59,130,246,0.06)}
.hamburger span{display:block;width:18px;height:1.5px;background:var(--text2);border-radius:2px;transition:all 0.3s}

/* ── MENU TRAY ── */
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(5px);z-index:60;opacity:0;pointer-events:none;transition:opacity 0.3s}
.menu-overlay.open{opacity:1;pointer-events:all}
.menu-tray{position:fixed;top:0;right:0;width:290px;height:100vh;background:var(--surface);border-left:1px solid var(--border2);z-index:70;transform:translateX(100%);transition:transform 0.38s cubic-bezier(0.16,1,0.3,1);display:flex;flex-direction:column;overflow:hidden}
.menu-tray.open{transform:translateX(0);box-shadow:-24px 0 80px rgba(0,0,0,0.6)}
.menu-head{padding:18px 18px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.menu-head-title{font-family:'Orbitron',monospace;font-size:0.72rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3)}
.menu-close{background:none;border:1px solid var(--border2);border-radius:7px;color:var(--text2);cursor:pointer;padding:5px 10px;font-size:0.8rem;transition:all 0.18s}
.menu-close:hover{background:var(--red);color:#fff;border-color:var(--red)}
.menu-user{padding:14px 18px;border-bottom:1px solid var(--border)}
.menu-user-label{font-size:0.61rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:5px}
.menu-items{flex:1;padding:10px;overflow-y:auto}
.menu-item{width:100%;display:flex;align-items:center;gap:11px;padding:10px 12px;background:transparent;border:none;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:0.84rem;cursor:pointer;border-radius:10px;text-align:left;transition:all 0.15s;margin-bottom:2px}
.menu-item:hover{background:var(--surface2);color:var(--text);transform:translateX(3px)}
.menu-icon{font-size:1rem;width:22px;text-align:center;flex-shrink:0}
.menu-bottom{padding:12px 10px;border-top:1px solid var(--border)}
.menu-danger:hover{background:rgba(239,68,68,0.1);color:var(--red)}

/* ── MAIN ── */
.main{max-width:760px;margin:0 auto;padding:0 14px 100px;position:relative;z-index:1}

/* ── DASHBOARD ── */
.dash-hero{padding:24px 0 20px;animation:fadeInDown 0.5s both}
.dash-welcome{font-family:'Orbitron',monospace;font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:4px}
.dash-sub{font-size:0.74rem;color:var(--text3);line-height:1.5;margin-bottom:18px}
.dash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.d-stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 12px;text-align:center;position:relative;overflow:hidden;transition:transform 0.22s}
.d-stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--cyan))}
.d-stat:hover{transform:translateY(-3px)}
.d-stat-n{display:block;font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:800;color:var(--accent2);line-height:1}
.d-stat-l{display:block;font-size:0.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-top:4px}
.streak-row{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between}
.streak-lbl{font-size:0.64rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:3px}
.streak-num{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:800;color:var(--orange);line-height:1.1}
.streak-num.fire{animation:streakFire 0.55s cubic-bezier(0.16,1,0.3,1)}
.streak-num small{font-size:0.55rem;color:var(--text3);display:block;font-family:'DM Sans',sans-serif;font-weight:400;text-transform:uppercase;letter-spacing:0.1em;margin-top:2px}
.btn-streak{background:linear-gradient(135deg,rgba(16,185,129,0.15),rgba(6,182,212,0.1));border:1px solid rgba(16,185,129,0.35);color:#10b981;font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:700;padding:9px 14px;border-radius:10px;cursor:pointer;transition:all 0.22s;white-space:nowrap}
.btn-streak:hover{background:rgba(16,185,129,0.22);border-color:rgba(16,185,129,0.6)}
.sec-label{font-family:'Orbitron',monospace;font-size:0.65rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin:0 0 14px;display:flex;align-items:center;gap:10px}
.sec-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}

/* ── CAREER PATH TILES ── */
.paths-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.path-tile{position:relative;border-radius:18px;overflow:hidden;cursor:pointer;transition:transform 0.3s cubic-bezier(0.16,1,0.3,1),box-shadow 0.3s;border:1px solid var(--border);background:var(--surface)}
.path-tile:hover{transform:translateY(-5px) scale(1.01);box-shadow:0 20px 50px rgba(0,0,0,0.35)}
.path-tile:active{transform:scale(0.98)}
.pt-header{padding:18px 16px 12px;position:relative;overflow:hidden}
.pt-glow{position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;filter:blur(30px);opacity:0.35;pointer-events:none}
.pt-icon{font-size:2rem;margin-bottom:8px;display:block;position:relative;z-index:1}
.pt-title{font-family:'Orbitron',monospace;font-size:0.8rem;font-weight:800;letter-spacing:0.02em;color:var(--text);margin-bottom:3px;position:relative;z-index:1}
.pt-tagline{font-size:0.66rem;color:var(--text3);position:relative;z-index:1}
.pt-badges{display:flex;flex-wrap:wrap;gap:5px;padding:10px 16px;border-top:1px solid var(--border)}
.pt-badge{font-size:0.57rem;font-weight:700;padding:3px 8px;border-radius:5px;font-family:'Space Mono',monospace;letter-spacing:0.06em;white-space:nowrap}
.pt-footer{padding:10px 16px 14px;display:flex;align-items:center;justify-content:space-between}
.pt-salary{font-size:0.68rem;color:var(--text2);font-weight:600}
.pt-salary span{color:var(--orange);font-weight:700}
.pt-arrow{font-size:0.75rem;color:var(--text3);transition:transform 0.2s}
.path-tile:hover .pt-arrow{transform:translateX(4px)}
.pt-progress{margin:0 16px 12px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.pt-progress-fill{height:100%;border-radius:2px;transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1)}
.path-tile.tile-active .pt-progress-fill{background:currentColor}

/* ── PATH DETAIL VIEW ── */
#pathView{display:none;animation:slideRight 0.35s cubic-bezier(0.16,1,0.3,1) both}
.path-hero{padding:20px 0 16px;border-bottom:1px solid var(--border);margin-bottom:20px}
.ph-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.ph-icon-wrap{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;border:1px solid var(--border2)}
.ph-title{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:800;color:var(--text);margin-bottom:4px}
.ph-tagline{font-size:0.72rem;color:var(--text3)}
.ph-badges{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.ph-badge{font-size:0.62rem;font-weight:700;padding:5px 11px;border-radius:7px;font-family:'Space Mono',monospace;letter-spacing:0.05em}
.ph-desc{font-size:0.77rem;color:var(--text2);line-height:1.65;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:14px}
.ph-meta-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.ph-meta-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 13px}
.ph-meta-label{font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:5px}
.ph-meta-val{font-size:0.8rem;font-weight:700;color:var(--text);line-height:1.4}

/* progress in detail */
.detail-progress{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:20px}
.dp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.dp-label{font-size:0.7rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em}
.dp-val{font-family:'Orbitron',monospace;font-size:0.82rem;font-weight:700;color:var(--accent2)}
.dp-track{height:7px;background:var(--bg2);border-radius:99px;overflow:hidden;position:relative}
.dp-fill{height:100%;border-radius:99px;position:relative;overflow:hidden;transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1)}
.dp-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.45),transparent);animation:progressShimmer 1.8s ease-in-out infinite}

/* ── PHASES + COURSES ── */
.phase-wrap{margin-bottom:10px;background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:transform 0.25s,box-shadow 0.25s,border-color 0.25s}
.phase-wrap:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(59,130,246,0.08);border-color:rgba(99,179,255,0.2)}
.phase-head{padding:16px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background 0.2s;user-select:none}
.phase-head:hover{background:rgba(99,179,255,0.04)}
.phase-left{display:flex;align-items:center;gap:12px}
.phase-pip{width:4px;height:40px;border-radius:2px;flex-shrink:0}
.phase-title{font-family:'Orbitron',monospace;font-size:0.75rem;font-weight:700;letter-spacing:0.04em;color:var(--text);margin-bottom:3px}
.phase-sub{font-size:0.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em}
.phase-right{display:flex;align-items:center;gap:10px}
.phase-count{font-family:'Space Mono',monospace;font-size:0.72rem;font-weight:700}
.phase-chev{color:var(--text3);font-size:0.7rem;transition:transform 0.35s cubic-bezier(0.16,1,0.3,1)}
.phase-chev.open{transform:rotate(180deg)}
.phase-body{max-height:0;overflow:hidden;transition:max-height 0.45s cubic-bezier(0.4,0,0.2,1)}
.phase-body.open{max-height:9999px}
.course-row{display:flex;align-items:flex-start;gap:12px;padding:11px 18px;border-top:1px solid var(--border);transition:background 0.15s}
.course-row:hover{background:rgba(99,179,255,0.03)}
.cbox{width:21px;height:21px;border:1.5px solid var(--border2);border-radius:6px;cursor:pointer;flex-shrink:0;margin-top:2px;transition:all 0.22s cubic-bezier(0.16,1,0.3,1);display:flex;align-items:center;justify-content:center}
.cbox:hover{border-color:var(--accent);background:rgba(59,130,246,0.08)}
.cbox.checked{background:linear-gradient(135deg,var(--accent),#1d4ed8);border-color:transparent;box-shadow:0 0 12px rgba(59,130,246,0.45);animation:checkPop 0.35s cubic-bezier(0.16,1,0.3,1)}
.cbox.checked::after{content:'✓';color:#fff;font-size:0.7rem;font-weight:700}
.c-info{flex:1;min-width:0}
.c-name{font-size:0.8rem;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:3px;transition:all 0.2s}
.c-name.done{color:var(--text3);text-decoration:line-through}
.c-meta{font-size:0.67rem;color:var(--text3);line-height:1.5;margin-bottom:6px}
.c-link{display:inline-block;font-size:0.67rem;font-weight:700;color:var(--accent2);text-decoration:none;margin-right:8px;padding:3px 8px;background:rgba(59,130,246,0.1);border-radius:5px;border:1px solid rgba(59,130,246,0.2);transition:all 0.15s;font-family:'Space Mono',monospace}
.c-link:hover{background:rgba(59,130,246,0.22);color:#fff;transform:translateY(-1px)}
.free-badge{font-size:0.55rem;background:linear-gradient(135deg,#10b981,#06b6d4);color:#fff;padding:2px 6px;border-radius:4px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;vertical-align:middle;margin-left:5px}
.new-badge{font-size:0.55rem;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;padding:2px 6px;border-radius:4px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;vertical-align:middle;margin-left:5px}
.phase-note{padding:12px 18px;font-size:0.72rem;line-height:1.6;border-top:1px solid var(--border)}

/* ── CERTS ── */
.cert-row{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:13px 15px;margin-bottom:8px;transition:transform 0.22s,border-color 0.22s,box-shadow 0.22s}
.cert-row:hover{transform:translateX(5px);border-color:var(--border2);box-shadow:0 4px 20px rgba(59,130,246,0.07)}
.cert-circle{width:22px;height:22px;border:2px solid var(--border2);border-radius:50%;cursor:pointer;flex-shrink:0;margin-top:2px;transition:all 0.22s cubic-bezier(0.16,1,0.3,1);display:flex;align-items:center;justify-content:center}
.cert-circle:hover{border-color:var(--purple)}
.cert-circle.checked{background:linear-gradient(135deg,var(--purple),var(--accent));border-color:transparent;box-shadow:0 0 14px rgba(139,92,246,0.45);animation:checkPop 0.35s}
.cert-circle.checked::after{content:'✓';color:#fff;font-size:0.65rem;font-weight:700}
.cert-info{flex:1;min-width:0}
.cert-n{font-size:0.8rem;font-weight:700;color:var(--text);margin-bottom:3px;transition:color 0.2s}
.cert-n.done{text-decoration:line-through;color:var(--text3)}
.cert-t{font-size:0.68rem;color:var(--text3);line-height:1.5;margin-bottom:6px}
.cbadge{font-size:0.57rem;font-weight:800;padding:4px 9px;border-radius:5px;text-transform:uppercase;letter-spacing:0.1em;white-space:nowrap;font-family:'Space Mono',monospace;margin-left:auto;align-self:flex-start;flex-shrink:0}
.cb-now{background:rgba(16,185,129,0.15);color:#10b981;border:1px solid rgba(16,185,129,0.3)}
.cb-goal{background:rgba(59,130,246,0.12);color:var(--accent2);border:1px solid rgba(59,130,246,0.25)}
.cb-later{background:rgba(75,96,128,0.2);color:var(--text3);border:1px solid var(--border)}

/* ── SKILLS ── */
.skills-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.skill-chip{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:9px;transition:all 0.22s cubic-bezier(0.16,1,0.3,1)}
.skill-chip:hover{border-color:var(--border2);transform:translateY(-2px)}
.skill-chip.owned{background:linear-gradient(135deg,rgba(16,185,129,0.08),rgba(6,182,212,0.05));border-color:rgba(16,185,129,0.35)}
.skill-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:all 0.3s}
.skill-chip.owned .skill-dot{background:var(--green);box-shadow:0 0 10px rgba(16,185,129,0.6);animation:pulseDot 2s infinite}
.skill-name{font-size:0.75rem;font-weight:600;color:var(--text)}
.skill-cat{font-size:0.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-top:1px}
.skill-chip.owned .skill-name{color:var(--green)}
.skills-note{font-size:0.73rem;color:var(--text2);line-height:1.6;background:rgba(59,130,246,0.05);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:14px}

/* ── TOOLS SECTION ── */
.tools-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.tool-chip{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:7px 13px;font-size:0.72rem;font-weight:700;color:var(--text2);font-family:'Space Mono',monospace}

/* ── EMPLOYERS SECTION ── */
.employers-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px}
.emp-chip{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:6px 12px;font-size:0.7rem;font-weight:600;color:var(--text2)}

/* ── NIGERIA TIP ── */
.ng-tip{background:linear-gradient(135deg,rgba(34,197,94,0.06),rgba(6,182,212,0.05));border:1px solid rgba(34,197,94,0.2);border-left:3px solid #22c55e;border-radius:12px;padding:13px 15px;margin-bottom:20px;font-size:0.74rem;color:var(--text2);line-height:1.65}
.ng-tip strong{color:#22c55e}

/* ── SPL ── */
.spl-label{font-size:0.68rem;font-weight:700;color:var(--text2);margin:14px 0 5px;text-transform:uppercase;letter-spacing:0.08em}
.spl-block{background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:12px 14px;font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--cyan);line-height:1.8;white-space:pre-wrap;word-break:break-all;position:relative;margin-bottom:8px}
.spl-block:hover{border-color:rgba(6,182,212,0.45)}
.spl-copy{position:absolute;top:8px;right:8px;background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.25);border-radius:5px;color:var(--accent2);font-family:'DM Sans',sans-serif;font-size:0.62rem;font-weight:700;cursor:pointer;padding:3px 8px;transition:all 0.18s}
.spl-copy:hover{background:var(--accent);color:#fff}
.spl-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:15px 17px;margin-bottom:10px}
.spl-section-title{font-family:'Orbitron',monospace;font-size:0.7rem;font-weight:700;margin-bottom:12px;letter-spacing:0.04em}

/* ── AI FAB ── */
.ai-fab{position:fixed;bottom:22px;right:18px;z-index:40;display:flex;align-items:center;gap:9px;padding:13px 20px;background:linear-gradient(135deg,var(--accent),#1d4ed8);border:none;border-radius:50px;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.83rem;font-weight:700;box-shadow:0 8px 36px rgba(59,130,246,0.5);transition:all 0.3s cubic-bezier(0.16,1,0.3,1)}
.ai-fab:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 14px 48px rgba(59,130,246,0.6)}
.ai-fab::before{content:'';position:absolute;inset:0;border-radius:50px;border:2px solid rgba(59,130,246,0.45);animation:glowPing 2.5s ease-out infinite}
.ai-fab::after{content:'';position:absolute;inset:0;border-radius:50px;border:2px solid rgba(59,130,246,0.2);animation:glowPing 2.5s ease-out infinite;animation-delay:1.25s}

/* ── AI DRAWER ── */
.ai-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(7px);z-index:80;opacity:0;pointer-events:none;transition:opacity 0.3s}
.ai-overlay.open{opacity:1;pointer-events:all}
.ai-drawer{position:fixed;bottom:0;left:0;right:0;max-height:85vh;background:var(--surface);border:1px solid var(--border2);border-radius:24px 24px 0 0;z-index:90;transform:translateY(100%);transition:transform 0.42s cubic-bezier(0.16,1,0.3,1);display:flex;flex-direction:column;overflow:hidden}
.ai-drawer.open{transform:translateY(0);box-shadow:0 -24px 80px rgba(0,0,0,0.55)}
.ai-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 4px;flex-shrink:0}
.ai-head{padding:10px 18px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.ai-head-left{display:flex;align-items:center;gap:11px}
.ai-live{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px rgba(16,185,129,0.7);animation:pulseDot 2s infinite}
.ai-title{font-family:'Orbitron',monospace;font-size:0.78rem;font-weight:700;color:var(--text)}
.ai-sub{font-size:0.62rem;color:var(--text3);margin-top:2px}
.ai-close{background:none;border:1px solid var(--border2);border-radius:7px;color:var(--text2);cursor:pointer;padding:5px 10px;font-size:0.8rem;transition:all 0.18s}
.ai-close:hover{background:var(--red);color:#fff;border-color:var(--red)}
.ai-sugs{padding:11px 14px;display:flex;gap:7px;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0}
.ai-sug{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:0.68rem;padding:6px 11px;cursor:pointer;transition:all 0.18s;white-space:nowrap}
.ai-sug:hover{background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.3);color:var(--accent2);transform:translateY(-1px)}
.ai-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.bubble{max-width:86%;padding:10px 13px;border-radius:14px;font-size:0.78rem;line-height:1.65;animation:fadeInUp 0.25s cubic-bezier(0.16,1,0.3,1) forwards}
.bubble-u{align-self:flex-end;background:linear-gradient(135deg,var(--accent),#1d4ed8);color:#fff;border-radius:14px 14px 3px 14px}
.bubble-ai{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:14px 14px 14px 3px}
.bubble-thinking{color:var(--text3);font-style:italic}
.ai-input-row{padding:12px 14px;border-top:1px solid var(--border);display:flex;gap:9px;background:var(--surface);flex-shrink:0}
.ai-input{flex:1;background:var(--bg2);border:1.5px solid var(--border2);border-radius:11px;padding:10px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.83rem;resize:none;outline:none;transition:border-color 0.2s}
.ai-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.15)}
.ai-input::placeholder{color:var(--text3)}
.ai-btn{background:linear-gradient(135deg,var(--accent),#1d4ed8);border:none;border-radius:11px;color:#fff;font-family:'Orbitron',monospace;font-size:0.72rem;font-weight:700;padding:0 18px;cursor:pointer;transition:all 0.2s}
.ai-btn:hover{opacity:0.88;transform:scale(1.03)}
.ai-btn:disabled{opacity:0.45;cursor:not-allowed;transform:none}

/* ── NOTIF MODAL ── */
#notifModal{display:none;position:fixed;inset:0;z-index:95;background:rgba(0,0,0,0.65);backdrop-filter:blur(7px);align-items:flex-end;justify-content:center;padding:0}
#notifModal.show{display:flex}
.notif-sheet{background:var(--surface);border:1px solid var(--border2);border-radius:22px 22px 0 0;padding:20px 22px 30px;width:100%;max-width:500px;animation:drawerUp 0.38s cubic-bezier(0.16,1,0.3,1)}

/* ── REVEAL ── */
.reveal{opacity:0;transform:translateY(26px);transition:opacity 0.6s cubic-bezier(0.16,1,0.3,1),transform 0.6s cubic-bezier(0.16,1,0.3,1)}
.reveal.visible{opacity:1;transform:translateY(0)}

/* ── TOAST ── */
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:10px 18px;font-size:0.79rem;font-weight:600;color:var(--text);z-index:200;opacity:0;transition:opacity 0.15s;pointer-events:none;white-space:nowrap;box-shadow:0 10px 40px rgba(0,0,0,0.4)}
.toast.show{opacity:1;animation:toastIn 0.42s cubic-bezier(0.16,1,0.3,1) forwards}

.footer{text-align:center;padding:30px 0 10px;font-size:0.67rem;color:var(--text3);line-height:1.8;font-family:'Space Mono',monospace}
@media(max-width:500px){.paths-grid{grid-template-columns:1fr}.dash-stats{gap:7px}.skills-grid{grid-template-columns:1fr}}
</style>
</head>
