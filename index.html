<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
[data-theme="dark"]{
  --bg:#0A0B0F;--bg2:#111318;--surface:#16181F;--card:#1C1F28;
  --border:#272B38;--border2:#323748;--text:#F0F2F8;--text2:#9BA3BC;--text3:#5C6480;
  --accent:#E8A020;--accent2:#C8861A;--accent-glow:rgba(232,160,32,0.15);
  --green:#22C97A;--green-glow:rgba(34,201,122,0.12);--blue:#4F8EF7;--red:#F05A5A;
  --phase1:#7C6FF7;--phase2:#3BBFD9;--phase3:#A855F7;--phase4:#F97316;--phase5:#EC4899;
  --shadow:0 4px 24px rgba(0,0,0,0.4);--shadow-sm:0 2px 8px rgba(0,0,0,0.3);
}
[data-theme="light"]{
  --bg:#F5F4F0;--bg2:#EEECEA;--surface:#FFFFFF;--card:#F9F8F5;
  --border:#E2DDD6;--border2:#CCC7BE;--text:#1A1816;--text2:#5C5650;--text3:#9C968E;
  --accent:#C07010;--accent2:#A05C0A;--accent-glow:rgba(192,112,16,0.1);
  --green:#18A362;--green-glow:rgba(24,163,98,0.1);--blue:#2E6FD4;--red:#D94040;
  --phase1:#5850D6;--phase2:#1B9AB8;--phase3:#8B35D6;--phase4:#C2410C;--phase5:#BE185D;
  --shadow:0 4px 24px rgba(0,0,0,0.08);--shadow-sm:0 2px 8px rgba(0,0,0,0.06);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:"Inter",sans-serif;min-height:100vh;overflow-x:hidden;transition:background 0.3s,color 0.3s}
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0}
[data-theme="dark"] .grid-bg{background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:44px 44px}
[data-theme="light"] .grid-bg{background-image:linear-gradient(rgba(0,0,0,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.04) 1px,transparent 1px);background-size:44px 44px}

/* AUTH */
#authPage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;z-index:1}
.auth-wrap{width:100%;max-width:400px;animation:slideUp 0.5s cubic-bezier(0.16,1,0.3,1) forwards}
.auth-brand{text-align:center;margin-bottom:32px}
.auth-brand-mark{display:inline-flex;align-items:center;gap:10px;margin-bottom:12px}
.auth-brand-icon{width:40px;height:40px;border-radius:10px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px}
.auth-brand-name{font-family:"Syne",sans-serif;font-size:1.3rem;font-weight:800;color:var(--text)}
.auth-brand p{font-size:0.72rem;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;box-shadow:var(--shadow)}
.auth-tabs{display:flex;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:22px;gap:4px}
.auth-tab{flex:1;padding:9px;background:transparent;border:none;border-radius:7px;color:var(--text3);font-family:"Inter",sans-serif;font-size:0.78rem;font-weight:500;cursor:pointer;transition:all 0.2s}
.auth-tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm);font-weight:600}
.field{margin-bottom:14px}
.field label{display:block;font-size:0.68rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.field input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:9px;padding:11px 14px;color:var(--text);font-family:"Inter",sans-serif;font-size:0.88rem;outline:none;transition:all 0.2s}
.field input:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px var(--accent-glow)}
.field input::placeholder{color:var(--text3)}
.btn-primary{width:100%;padding:12px;background:var(--accent);color:#0A0B0F;border:none;border-radius:9px;font-family:"Syne",sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.03em}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 16px var(--accent-glow)}
.auth-err{color:var(--red);font-size:0.72rem;text-align:center;margin-top:10px;min-height:16px;font-weight:500}
.pass-wrap{position:relative}
.pass-wrap input{padding-right:44px;width:100%}
.pass-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:0.95rem;color:var(--text3);padding:0;line-height:1}

/* APP */
#app{display:none;position:relative;z-index:1}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(10,11,15,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 20px}
[data-theme="light"] .nav{background:rgba(245,244,240,0.88)}
.nav-inner{max-width:960px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-logo-icon{width:30px;height:30px;border-radius:7px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px}
.nav-logo-text{font-family:"Syne",sans-serif;font-size:0.9rem;font-weight:800;color:var(--text)}
.hamburger{width:38px;height:38px;background:transparent;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:all 0.2s}
.hamburger:hover{border-color:var(--accent);background:var(--card)}
.hamburger span{display:block;width:14px;height:1.5px;background:var(--text2);border-radius:2px}
.hamburger:hover span{background:var(--accent)}

/* MENU TRAY */
.menu-tray{position:fixed;top:0;right:0;bottom:0;width:270px;background:var(--surface);border-left:1px solid var(--border);z-index:999;transform:translateX(100%);transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);box-shadow:-8px 0 32px rgba(0,0,0,0.3);display:flex;flex-direction:column}
.menu-tray.open{transform:translateX(0)}
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:998;opacity:0;pointer-events:none;transition:opacity 0.3s}
.menu-overlay.open{opacity:1;pointer-events:all}
.menu-head{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.menu-head-title{font-family:"Syne",sans-serif;font-size:0.88rem;font-weight:700}
.menu-close{background:none;border:none;color:var(--text3);font-size:1.2rem;cursor:pointer;padding:4px;transition:color 0.2s;line-height:1}
.menu-close:hover{color:var(--text)}
.menu-user{padding:14px 18px;border-bottom:1px solid var(--border)}
.menu-user-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:6px}
.menu-items{flex:1;padding:12px 10px;overflow-y:auto}
